[settings]
activate_aggressive = true
experimental = true

[settings.status]
missing_tools = "always"
show_tools = true

[tools]
bun = "latest"
node = "24"
python = "latest"
ripgrep = "latest"
yarn = "latest"
pnpm = "latest"
lua = "latest"
deno = "latest"
dotnet = "8"
go = "latest"
"npm:tree-sitter-cli" = "latest"
"npm:ajv-cli" = "latest"

[env]
npm_config_registry = "https://npmjs.org"
